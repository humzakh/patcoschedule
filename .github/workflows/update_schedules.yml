name: Update PATCO Schedules

on:
  schedule:
    # Run every 30 minutes
    - cron: '*/30 * * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fetch-schedules:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        id: checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        id: install-deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch schedule PDFs
        id: fetch
        run: python scripts/download_schedules.py

      - name: Validate fetched data
        id: validate
        run: |
          PDF_COUNT=$(find data/schedules/source_pdfs -name '*.pdf' 2>/dev/null | wc -l)
          echo "Found $PDF_COUNT PDF(s) on disk."
          if [ "$PDF_COUNT" -eq 0 ]; then
            echo "::error::No PDF files found after download step."
            exit 1
          fi
          
          # Validate metadata.json is not empty
          if [ ! -s data/schedules/metadata.json ]; then
            echo "::error::metadata.json is missing or empty."
            exit 1
          fi
          
          ENTRY_COUNT=$(python3 -c "import json; print(len(json.load(open('data/schedules/metadata.json'))))")
          if [ "$ENTRY_COUNT" -eq 0 ]; then
            echo "::error::metadata.json contains no entries."
            exit 1
          fi
          echo "✅ Validation passed: $PDF_COUNT PDF(s), $ENTRY_COUNT metadata entries."

      - name: Upload raw schedules
        id: upload
        uses: actions/upload-artifact@v7
        with:
          name: raw-schedules
          path: data/schedules/
          retention-days: 1

  generate-data:
    needs: fetch-schedules
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        id: checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        id: install-deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download raw schedules
        id: download
        uses: actions/download-artifact@v8
        with:
          name: raw-schedules
          path: data/schedules

      - name: Parse PDFs and generate data
        id: generate
        run: python scripts/generate_data.py

      - name: Validate generated data
        id: validate
        run: |
          if [ ! -s data/patco_data.json ]; then
            echo "::error::patco_data.json is missing or empty."
            exit 1
          fi
          
          # Validate JSON structure has actual schedule data
          STANDARD_COUNT=$(jq '.schedules.standard | length' data/patco_data.json)
          if [ "$STANDARD_COUNT" -eq 0 ]; then
            echo "::error::No standard schedules in generated JSON."
            exit 1
          fi
          
          TRIP_COUNT=$(jq '[.schedules.standard[] | select(.) | ((.westbound.times // []) | length) + ((.eastbound.times // []) | length)] | add // 0' data/patco_data.json)
          if [ "$TRIP_COUNT" -eq 0 ]; then
            echo "::error::Generated JSON has 0 trips. Data is empty."
            exit 1
          fi
          
          echo "✅ Validation passed: $STANDARD_COUNT schedule type(s), $TRIP_COUNT total trips."

      - name: Upload generated data
        id: upload
        uses: actions/upload-artifact@v7
        with:
          name: schedule-data
          path: |
            data/patco_data.json
            data/standard_pdf.json
          retention-days: 1

  compare-data:
    needs: generate-data
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.compare.outputs.changed }}
    steps:
      - name: Checkout data branch
        id: checkout-data
        uses: actions/checkout@v6
        with:
          ref: 'data'
          path: 'data-branch'
          
      - name: Download generated data
        id: download
        uses: actions/download-artifact@v8
        with:
          name: schedule-data
          path: .

      - name: Compare new & old data
        id: compare
        run: |
          NEW_JSON="patco_data.json"
          OLD_JSON="data-branch/patco_data.json"
          
          if [ ! -f "$NEW_JSON" ]; then
            echo "::error::New JSON not found! generate_data.py failed to produce output."
            exit 1
          fi
          
          NEW_TRIPS=$(jq '[.schedules.standard[] | select(.) | ((.westbound.times // []) | length) + ((.eastbound.times // []) | length)] | add // 0' "$NEW_JSON")
          echo "New data has $NEW_TRIPS trips."
          
          if [ "$NEW_TRIPS" -eq 0 ]; then
            echo "::error::New data has 0 trips. Refusing to push empty data."
            exit 1
          fi
          
          if [ ! -f "$OLD_JSON" ]; then
            echo "No existing data — first run."
            echo "changed=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          OLD_TRIPS=$(jq '[.schedules.standard[] | select(.) | ((.westbound.times // []) | length) + ((.eastbound.times // []) | length)] | add // 0' "$OLD_JSON")
          echo "Old data has $OLD_TRIPS trips."
          
          # If new data has dramatically fewer trips (>50% reduction), block the push
          if [ "$OLD_TRIPS" -gt 0 ]; then
            THRESHOLD=$((OLD_TRIPS / 2))
            if [ "$NEW_TRIPS" -lt "$THRESHOLD" ]; then
              echo "::error::New data has $NEW_TRIPS trips vs old data's $OLD_TRIPS trips (>50% reduction). Blocking push."
              exit 1
            fi
          fi
          
          OLD_DATA=$(jq -S 'del(.last_updated)' "$OLD_JSON")
          NEW_DATA=$(jq -S 'del(.last_updated)' "$NEW_JSON")
          
          if [ "$OLD_DATA" = "$NEW_DATA" ]; then
            echo "Schedule data unchanged."
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "Schedule data has changed!"
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

  push-changes:
    needs: compare-data
    if: needs.compare-data.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout data branch
        id: checkout-data
        uses: actions/checkout@v6
        with:
          ref: 'data'
          
      - name: Download generated data
        id: download
        uses: actions/download-artifact@v8
        with:
          name: schedule-data
          path: downloaded-data
          
      - name: Push new data
        id: push
        run: |
          cp downloaded-data/patco_data.json patco_data.json
          cp downloaded-data/standard_pdf.json standard_pdf.json || true
          
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add patco_data.json
          git add standard_pdf.json || true
          if [ "${{ github.event_name }}" = "schedule" ]; then
            COMMIT_MSG="Auto-update schedule data"
          else
            COMMIT_MSG="Manually updated schedule data"
          fi
          git commit -m "$COMMIT_MSG" || echo "No changes to commit"
          git push origin data
          echo "Schedule data updated and pushed."

  notify-failure:
    needs: push-changes
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      issues: write
      actions: read
    steps:
      - name: Create issue on failure
        uses: actions/github-script@v9
        with:
          script: |
            const response = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId
            });
            const failedJob = response.data.jobs.find(j => j.conclusion === 'failure');
            const reason = failedJob ? `Failure in job: ${failedJob.name}` : "Unknown pipeline failure";
            
            const title = `⚠️ Schedule update failed: ${reason}`;
            const body = `The automated schedule update workflow failed during the **${reason}** stage.\n\n[View run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`;
            
            const existingIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'automation-failure'
            });

            const isDuplicate = existingIssues.data.some(issue => issue.title === title);
            
            if (!isDuplicate) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['automation-failure']
              });
            } else {
              console.log(`Issue already exists for failure mode: ${reason}. Skipping creation.`);
            }
