name: Deploy Site to GitHub Pages

on:
  push:
    branches:
      - master

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy-pages:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
      actions: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Check for script changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            scripts:
              - 'scripts/**'
      - name: Trigger schedule update if scripts changed
        if: steps.filter.outputs.scripts == 'true'
        run: |
          echo "Scripts changed, triggering schedule update..."
          gh workflow run update_schedules.yml --ref master
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Cache-bust asset URLs
        run: |
          sed -i "s/__CACHE_BUST__/${GITHUB_SHA::7}/g" index.html sw.js app/js/*.js
      - name: Stage site files
        run: |
          mkdir -p _site
          cp index.html _site/
          cp manifest.json _site/
          cp sw.js _site/
          cp favicon.ico _site/
          cp CNAME _site/
          cp -r app _site/app
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
